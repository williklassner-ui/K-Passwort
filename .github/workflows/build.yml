name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to publish the APK as a release

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Create asset directories
        run: mkdir -p assets/fonts assets/lottie assets/icons

      - name: Download Inter font
        run: |
          curl -fsSL "https://github.com/rsms/inter/releases/download/v4.0/Inter-4.0.zip" -o inter.zip
          mkdir -p inter_tmp
          unzip inter.zip -d inter_tmp
          find inter_tmp -name "Inter-Regular.ttf" | head -1 | xargs -I{} cp {} assets/fonts/Inter-Regular.ttf
          find inter_tmp -name "Inter-Medium.ttf" | head -1 | xargs -I{} cp {} assets/fonts/Inter-Medium.ttf
          find inter_tmp -name "Inter-SemiBold.ttf" | head -1 | xargs -I{} cp {} assets/fonts/Inter-SemiBold.ttf
          find inter_tmp -name "Inter-Bold.ttf" | head -1 | xargs -I{} cp {} assets/fonts/Inter-Bold.ttf
          rm -rf inter.zip inter_tmp
          ls -la assets/fonts/

      - name: Download JetBrains Mono font
        run: |
          curl -fsSL "https://github.com/JetBrains/JetBrainsMono/releases/download/v2.304/JetBrainsMono-2.304.zip" -o jbm.zip
          mkdir -p jbm_tmp
          unzip jbm.zip -d jbm_tmp
          find jbm_tmp -name "JetBrainsMono-Regular.ttf" | head -1 | xargs -I{} cp {} assets/fonts/JetBrainsMono-Regular.ttf
          find jbm_tmp -name "JetBrainsMono-Medium.ttf" | head -1 | xargs -I{} cp {} assets/fonts/JetBrainsMono-Medium.ttf
          rm -rf jbm.zip jbm_tmp
          ls -la assets/fonts/

      - name: Verify fonts
        run: |
          for f in Inter-Regular Inter-Medium Inter-SemiBold Inter-Bold JetBrainsMono-Regular JetBrainsMono-Medium; do
            [ -f "assets/fonts/${f}.ttf" ] && echo "✓ ${f}.ttf" || { echo "✗ MISSING: ${f}.ttf"; exit 1; }
          done

      - name: Install dependencies
        run: flutter pub get

      # TEMPORARY diagnostic step — dumps the resolved kdbx package's
      # Argon2/KDF-parameter API so it can be verified before writing code
      # against it (this project has broken CI twice already from
      # unverified package-API guesses). Removed again in the follow-up
      # commit once the real API is confirmed.
      - name: DEBUG dump kdbx Argon2/KDF API
        run: |
          KDBX_DIR="$(find "$PUB_CACHE"/hosted -maxdepth 2 -type d -name "kdbx-*" | head -1)"
          echo "KDBX_DIR=$KDBX_DIR"
          echo "---- files mentioning Argon2/Kdf ----"
          grep -rl "Argon2\|KdfParameters" "$KDBX_DIR"/lib || true
          echo "---- create() signature in kdbx_format.dart ----"
          grep -n -A 15 "create(" "$KDBX_DIR"/lib/src/kdbx_format.dart || true
          echo "---- full dump of Argon2/Kdf-related files ----"
          for f in $(find "$KDBX_DIR" -iname "*argon2*" -o -iname "*kdf*"); do
            echo "===== $f ====="
            cat "$f"
          done
          echo "---- full dump of argon2_ffi_base ----"
          FFI_BASE_DIR="$(find "$PUB_CACHE"/hosted -maxdepth 2 -type d -name "argon2_ffi_base-*" | head -1)"
          find "$FFI_BASE_DIR" -name "*.dart" -exec sh -c 'echo "===== {} ====="; cat "{}"' \;
          exit 1

      - name: Run code generation
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # Das argon2_ffi-Plugin pinnt CMake 3.10.2; auf dem Runner ist nur
      # 3.22.1 vorinstalliert und AGP installiert gepinnte Versionen nicht
      # automatisch nach ([CXX1300]).
      - name: Install CMake 3.10.2 (needed by argon2_ffi)
        run: |
          SDKMANAGER="$(ls -d "$ANDROID_HOME"/cmdline-tools/*/bin/sdkmanager 2>/dev/null | head -1)"
          echo "sdkmanager: $SDKMANAGER"
          yes | "$SDKMANAGER" --install "cmake;3.10.2.4988404" || true
          ls "$ANDROID_HOME/cmake/3.10.2.4988404/bin/cmake"

      - name: Build APK (release)
        run: flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/K-Passwort.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: k-passwort-release-apk
          path: build/app/outputs/flutter-apk/K-Passwort.apk

      - name: Publish APK release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: K-Passwort (latest)
          body: Automatisch erstelltes Release der neuesten main-Version.
          files: build/app/outputs/flutter-apk/K-Passwort.apk
          prerelease: true
          retention-days: 30
